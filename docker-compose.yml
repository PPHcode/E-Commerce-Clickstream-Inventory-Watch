services:
  # ---------------- Kafka ----------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_log:/var/lib/zookeeper/log
    networks: [bigdata]
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: INTERNAL for containers, EXTERNAL for host machine
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [bigdata]
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on: [kafka]
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      sleep 20
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic clickstream-events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic flash-sale-alerts --partitions 1 --replication-factor 1
      echo 'Topics created.'
      kafka-topics --bootstrap-server kafka:9092 --list
      "
    networks: [bigdata]

  # ---------------- Producer ----------------
  producer:
    build: ./producer
    container_name: producer
    depends_on: [kafka-init]
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      EVENTS_PER_SECOND: "20"
    networks: [bigdata]
    restart: unless-stopped

  # ---------------- Spark ----------------
  spark:
    image: apache/spark:3.5.0
    container_name: spark
    depends_on: [kafka-init]
    user: root
    volumes:
      - ./spark:/opt/app
      - ./data:/opt/data
      - spark_ivy:/root/.ivy2
    networks: [bigdata]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "[spark] Waiting 30s for Kafka..." && sleep 30 && \
        /opt/spark/bin/spark-submit \
          --master "local[2]" \
          --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0 \
          --conf spark.sql.shuffle.partitions=2 \
          --conf spark.jars.ivy=/root/.ivy2 \
          /opt/app/streaming_job.py

  # ---------------- Airflow ----------------
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [bigdata]

  airflow-init:
    build: ./airflow
    container_name: airflow-init
    depends_on: [postgres]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - ./data:/opt/data
      - ./reports:/opt/reports
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname A --lastname D --role Admin --email a@a.com || true"
    networks: [bigdata]

  airflow-webserver:
    build: ./airflow
    container_name: airflow-webserver
    depends_on: [airflow-init]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "supersecretkey-change-me"
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - ./data:/opt/data
      - ./reports:/opt/reports
    command: webserver
    networks: [bigdata]
    restart: unless-stopped

  airflow-scheduler:
    build: ./airflow
    container_name: airflow-scheduler
    depends_on: [airflow-init]
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "supersecretkey-change-me"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/scripts:/opt/airflow/scripts
      - ./data:/opt/data
      - ./reports:/opt/reports
    command: scheduler
    networks: [bigdata]
    restart: unless-stopped

networks:
  bigdata:
    driver: bridge

volumes:
  postgres_data:
  spark_ivy:
  zk_data:
  zk_log:
  kafka_data:
